name: Java CI & Javadoc

on:
  push:
    branches: [ "*" ]

permissions:
  contents: write

jobs:
  build-and-document:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilation et Vérification
        run: mvn -B clean verify

      - name: Désactiver Jekyll (Fix)
        run: touch ./docs/apidocs/.nojekyll

      - name: Déploiement sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/apidocs
          publish_branch: gh-pages
          commit_message: "docs: publication de la Javadoc depuis le dossier docs/apidocs"