name: Java CI & Javadoc

on:
  push:
    branches: [ "*" ]

permissions:
  contents: write # Nécessaire pour que le bot puisse créer la branche gh-pages

jobs:
  build-and-document:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilation et Vérification
        run: mvn -B clean verify

      - name: Génération de la Javadoc
        run: mvn -B javadoc:javadoc

      - name: Désactiver Jekyll
        run: touch ./target/site/apidocs/.nojekyll

      - name: Déploiement de la Javadoc sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site/apidocs
          publish_branch: gh-pages
          commit_message: "docs: déploiement automatique de la Javadoc"